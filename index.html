<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AutoLearn Hub - Final Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-900">

    <div id="app" class="min-h-screen flex flex-col">
        <header class="bg-[#1e88e5] text-white sticky top-0 z-50 shadow-md">
            <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
                <div onclick="navigate('dashboard')" class="flex items-center gap-2 cursor-pointer active:scale-95 transition">
                    <div class="bg-white text-[#1e88e5] p-1.5 rounded-xl shadow-inner">
                        <i data-lucide="layout-grid" class="w-5 h-5"></i>
                    </div>
                    <span class="font-extrabold text-lg tracking-tight">AutoLearn <span class="text-blue-200">Hub</span></span>
                </div>
                <div id="status-cloud" class="flex items-center gap-2 bg-black/20 px-3 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest border border-white/10">
                    <div class="w-2 h-2 bg-yellow-400 rounded-full animate-pulse"></div>
                    Connecting
                </div>
            </div>
        </header>

        <main class="max-w-5xl mx-auto w-full px-4 py-6 flex-grow">
            <nav id="breadcrumb" class="flex items-center gap-2 text-xs font-semibold text-slate-400 mb-6 overflow-x-auto no-scrollbar whitespace-nowrap"></nav>
            <div id="view-container"></div>
        </main>

        <div id="modal-overlay" class="fixed inset-0 bg-slate-900/60 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-sm transition-all">
            <div class="bg-white rounded-[2.5rem] w-full max-w-md shadow-2xl overflow-hidden transform transition-all scale-90 opacity-0" id="modal-box">
                <div class="p-6 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
                    <h3 id="modal-title" class="font-extrabold text-slate-800">Title</h3>
                    <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-red-50 text-slate-400 hover:text-red-500 transition"><i data-lucide="x"></i></button>
                </div>
                <div id="modal-content" class="p-6"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDrMIXYG_T3TCsVqLzOizGiZH8NLA8d-jA",
            authDomain: "autolern.firebaseapp.com",
            projectId: "autolern",
            storageBucket: "autolern.firebasestorage.app",
            messagingSenderId: "428353288899",
            appId: "1:428353288899:web:59a2a4e60c3e9e14218076"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        signInAnonymously(auth).then(() => {
            document.getElementById('status-cloud').innerHTML = '<div class="w-2 h-2 bg-green-400 rounded-full shadow-[0_0_8px_#4ade80]"></div> Online';
            initListeners();
        });

        let observations = [];
        let materials = [];
        let state = { view: 'dashboard', groupId: null, obsId: null, searchQuery: '' };

        const GROUPS = [
            { id: 'g1', name: 'Kelompok 1', desc: 'Mesin & EFI', color: 'bg-blue-600', icon: 'settings' },
            { id: 'g2', name: 'Kelompok 2', desc: 'Sasis & Pemindah Daya', color: 'bg-indigo-600', icon: 'truck' },
            { id: 'g3', name: 'Kelompok 3', desc: 'Kelistrikan & AC', color: 'bg-cyan-600', icon: 'zap' }
        ];

        function initListeners() {
            onSnapshot(query(collection(db, "observasi"), orderBy("timestamp", "desc")), (snap) => {
                observations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            });
            onSnapshot(query(collection(db, "materi"), orderBy("timestamp", "desc")), (snap) => {
                materials = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            });
        }

        window.navigate = (view, gid = null, oid = null) => {
            state = { ...state, view, groupId: gid, obsId: oid, searchQuery: '' };
            render();
            window.scrollTo(0,0);
        };

        window.handleSearch = (e) => {
            state.searchQuery = e.target.value.toLowerCase();
            renderMaterialsOnly();
        };

        window.hapusData = async (type, id) => {
            if(confirm("Hapus data ini selamanya?")) {
                try {
                    await deleteDoc(doc(db, type, id));
                    if(type === 'observasi') {
                        materials.filter(m => m.obsId === id).forEach(async m => {
                            await deleteDoc(doc(db, "materi", m.id));
                        });
                        navigate('group', state.groupId);
                    }
                } catch (e) { alert("Error: Cek Rules Firestore kamu!"); }
            }
        };

        function render() {
            const container = document.getElementById('view-container');
            const breadcrumb = document.getElementById('breadcrumb');

            let bc = `<button onclick="navigate('dashboard')" class="flex items-center gap-1 uppercase tracking-widest"><i data-lucide="home" class="w-3 h-3"></i> Home</button>`;
            if (state.groupId) {
                const g = GROUPS.find(x => x.id === state.groupId);
                bc += ` <i data-lucide="chevron-right" class="w-3 h-3 text-slate-300"></i> <button onclick="navigate('group', '${g.id}')">${g.name}</button>`;
            }
            if (state.obsId) {
                const o = observations.find(x => x.id === state.obsId);
                bc += ` <i data-lucide="chevron-right" class="w-3 h-3 text-slate-300"></i> <span class="text-blue-600 font-bold truncate max-w-[120px]">${o?.title || '...'}</span>`;
            }
            breadcrumb.innerHTML = bc;

            if (state.view === 'dashboard') renderDashboard(container);
            else if (state.view === 'group') renderGroup(container);
            else if (state.view === 'observation') renderObservation(container);

            lucide.createIcons();
        }

        function renderDashboard(container) {
            container.innerHTML = `
                <div class="mb-8 p-8 rounded-[2.5rem] bg-white border border-slate-200 shadow-xl shadow-slate-200/50 relative overflow-hidden">
                    <h1 class="text-3xl font-extrabold text-slate-900 tracking-tighter leading-none mb-2 italic">DASHBOARD<br>KOLABORASI</h1>
                    <p class="text-slate-400 text-sm font-semibold uppercase tracking-widest">LKS Otomotif Tech Hub</p>
                    <div class="absolute -right-6 -bottom-6 opacity-10 rotate-12"><i data-lucide="cpu" class="w-32 h-32"></i></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    ${GROUPS.map(g => `
                        <div onclick="navigate('group', '${g.id}')" class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all cursor-pointer group">
                            <div class="w-14 h-14 ${g.color} text-white rounded-2xl flex items-center justify-center mb-6 shadow-lg"><i data-lucide="${g.icon}" class="w-7 h-7"></i></div>
                            <h3 class="text-xl font-extrabold text-slate-800">${g.name}</h3>
                            <p class="text-slate-400 text-xs mt-2 leading-relaxed">${g.desc}</p>
                        </div>
                    `).join('')}
                </div>`;
        }

        function renderGroup(container) {
            const g = GROUPS.find(x => x.id === state.groupId);
            const list = observations.filter(o => o.groupId === state.groupId);
            container.innerHTML = `
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <div class="text-[10px] font-bold text-blue-600 uppercase tracking-[0.3em] mb-1">Kategori</div>
                        <h2 class="text-2xl font-extrabold text-slate-800">${g.name}</h2>
                    </div>
                    <button id="btn-add-obs" class="bg-blue-600 text-white p-4 rounded-2xl shadow-lg active:scale-90 transition"><i data-lucide="plus"></i></button>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    ${list.length ? list.map(o => `
                        <div class="bg-white p-5 rounded-[1.5rem] border border-slate-200 shadow-sm relative group">
                            <div onclick="navigate('observation', '${g.id}', '${o.id}')" class="cursor-pointer pr-10">
                                <h3 class="font-bold text-slate-800 text-lg leading-tight mb-1">${o.title}</h3>
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter italic">Buka Materi →</span>
                            </div>
                            <button onclick="hapusData('observasi', '${o.id}')" class="absolute top-5 right-5 text-slate-300 hover:text-red-500 transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    `).join('') : '<div class="col-span-full text-center py-10 text-slate-400 italic text-sm">Belum ada daftar observasi.</div>'}
                </div>`;
            
            document.getElementById('btn-add-obs').onclick = () => openModal("Buat Observasi", `
                <input type="text" id="inp-title" placeholder="Nama Observasi (ex: Sistem AC)..." class="w-full bg-slate-100 border-none p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 mb-4 font-bold">
                <button id="save-obs" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-extrabold shadow-lg uppercase tracking-widest">Simpan</button>
            `, async () => {
                const title = document.getElementById('inp-title').value;
                if(!title) return;
                await addDoc(collection(db, "observasi"), { title, groupId: state.groupId, timestamp: Date.now() });
                closeModal();
            });
        }

        function renderObservation(container) {
            const o = observations.find(x => x.id === state.obsId);
            container.innerHTML = `
                <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-md mb-8">
                    <div class="flex justify-between items-start mb-6">
                        <div class="max-w-[70%]">
                            <h2 class="text-xl font-extrabold text-slate-800 leading-tight">${o?.title || '...'}</h2>
                            <p class="text-[10px] font-bold text-slate-400 uppercase mt-1 tracking-widest">Base Materi</p>
                        </div>
                        <button id="btn-add-mat" class="bg-blue-600 text-white px-4 py-3 rounded-xl flex items-center gap-2 text-xs font-bold active:scale-95 transition shadow-lg shadow-blue-200">
                            <i data-lucide="video" class="w-4 h-4"></i> Tambah
                        </button>
                    </div>
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="text" id="search-input" oninput="handleSearch(event)" placeholder="Cari materi..." 
                            class="w-full pl-10 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 text-sm font-semibold">
                    </div>
                </div>
                <div id="materials-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-6 pb-20"></div>`;

            renderMaterialsOnly();

            document.getElementById('btn-add-mat').onclick = () => openModal("Tambah Materi", `
                <div class="space-y-4">
                    <input type="text" id="mat-title" placeholder="Judul Video..." class="w-full bg-slate-100 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                    <input type="url" id="mat-url" placeholder="Link YouTube/Shorts..." class="w-full bg-slate-100 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    <textarea id="mat-notes" placeholder="Catatan singkat..." rows="3" class="w-full bg-slate-100 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 text-sm"></textarea>
                    <button id="save-mat" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-extrabold shadow-lg">KIRIM KE CLOUD</button>
                </div>
            `, async () => {
                const title = document.getElementById('mat-title').value;
                const url = document.getElementById('mat-url').value;
                const notes = document.getElementById('mat-notes').value;
                if(!title || !url) return alert("Isi data dengan lengkap!");
                await addDoc(collection(db, "materi"), { title, url, notes, obsId: state.obsId, groupId: state.groupId, timestamp: Date.now() });
                closeModal();
            });
        }

        function renderMaterialsOnly() {
            const grid = document.getElementById('materials-grid');
            if(!grid) return;

            const filtered = materials.filter(m => {
                if (m.obsId !== state.obsId) return false;
                if (!state.searchQuery) return true;
                return m.title.toLowerCase().includes(state.searchQuery) || (m.notes || '').toLowerCase().includes(state.searchQuery);
            });

            grid.innerHTML = filtered.length ? filtered.map(m => `
                <div class="bg-white rounded-[2rem] border border-slate-200 overflow-hidden shadow-sm relative group animate-in fade-in zoom-in duration-300">
                    <button onclick="hapusData('materi', '${m.id}')" class="absolute top-4 right-4 bg-white/90 p-2.5 rounded-xl text-red-500 shadow-xl z-20 hover:bg-red-500 hover:text-white transition-all active:scale-90 border border-slate-100">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                    <div class="video-container m-2 shadow-inner">
                        <iframe src="https://www.youtube.com/embed/${getYouTubeId(m.url)}?enablejsapi=1&rel=0&origin=${window.location.origin}" allowfullscreen allow="autoplay; encrypted-media"></iframe>
                    </div>
                    <div class="p-5">
                        <h3 class="font-extrabold text-slate-800 leading-tight mb-2 pr-8">${m.title}</h3>
                        <div class="bg-blue-50/50 p-4 rounded-2xl text-slate-600 text-xs leading-relaxed border border-blue-100 italic">
                            ${m.notes || 'Tidak ada catatan.'}
                        </div>
                    </div>
                </div>
            `).join('') : '<div class="col-span-full text-center py-20 text-slate-400 font-bold italic">Materi belum tersedia.</div>';
            lucide.createIcons();
        }

        window.openModal = (title, content, onSave) => {
            const overlay = document.getElementById('modal-overlay');
            const box = document.getElementById('modal-box');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-content').innerHTML = content;
            overlay.classList.remove('hidden');
            setTimeout(() => {
                box.classList.remove('scale-90', 'opacity-0');
                box.classList.add('scale-100', 'opacity-100');
            }, 10);
            const saveBtn = overlay.querySelector('button[id^="save-"]');
            if(saveBtn) saveBtn.onclick = onSave;
            lucide.createIcons();
        };

        window.closeModal = () => {
            const box = document.getElementById('modal-box');
            box.classList.add('scale-90', 'opacity-0');
            setTimeout(() => document.getElementById('modal-overlay').classList.add('hidden'), 200);
        };

        function getYouTubeId(url) {
            let videoId = '';
            if (url.includes('shorts/')) videoId = url.split('shorts/')[1]?.split(/[?#&]/)[0];
            else if (url.includes('youtu.be/')) videoId = url.split('youtu.be/')[1]?.split(/[?#&]/)[0];
            else if (url.includes('v=')) videoId = url.split('v=')[1]?.split(/[?#&]/)[0];
            return videoId || 'dQw4w9WgXcQ';
        }

        render();
    </script>
</body>
</html>
