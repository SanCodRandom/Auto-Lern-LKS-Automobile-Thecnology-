<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoLearn Hub - Cloud Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .search-focus:focus-within { border-color: #1e88e5; box-shadow: 0 0 0 4px rgba(30, 136, 229, 0.1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="app">
        <!-- NAVBAR -->
        <header class="bg-[#1e88e5] text-white shadow-lg sticky top-0 z-50">
            <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                <div onclick="navigate('dashboard')" class="flex items-center gap-2 font-bold text-xl cursor-pointer">
                    <div class="bg-white text-[#1e88e5] p-1.5 rounded-lg shadow-md">
                        <i data-lucide="share-2" class="w-5 h-5"></i>
                    </div>
                    <span>AutoLearn Hub</span>
                </div>
                <div id="status-cloud" class="text-xs flex items-center gap-2 bg-blue-800/40 px-3 py-1.5 rounded-full">
                    <div class="w-2 h-2 bg-yellow-400 rounded-full animate-pulse"></div>
                    Menghubungkan...
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-4 py-8">
            <nav id="breadcrumb" class="flex items-center gap-2 text-sm text-slate-500 mb-6 overflow-x-auto whitespace-nowrap pb-2"></nav>
            <div id="view-container"></div>
        </main>

        <!-- MODAL -->
        <div id="modal-overlay" class="fixed inset-0 bg-black/60 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
            <div class="bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden">
                <div class="flex justify-between items-center p-6 border-b border-slate-100 bg-slate-50">
                    <h3 id="modal-title" class="font-bold text-xl text-slate-800">Judul</h3>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-red-500"><i data-lucide="x"></i></button>
                </div>
                <div id="modal-content" class="p-8"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // CONFIG FIREBASE IKHSAN
        const firebaseConfig = {
            apiKey: "AIzaSyDrMIXYG_T3TCsVqLzOizGiZH8NLA8d-jA",
            authDomain: "autolern.firebaseapp.com",
            projectId: "autolern",
            storageBucket: "autolern.firebasestorage.app",
            messagingSenderId: "428353288899",
            appId: "1:428353288899:web:59a2a4e60c3e9e14218076",
            measurementId: "G-MGFFFPQ1DB"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        signInAnonymously(auth).then(() => {
            document.getElementById('status-cloud').innerHTML = '<div class="w-2 h-2 bg-green-400 rounded-full"></div> Terhubung ke Cloud';
            initListeners();
        });

        let observations = [];
        let materials = [];
        let state = { view: 'dashboard', groupId: null, obsId: null, searchQuery: '' };

        const GROUPS = [
            { id: 'g1', name: 'Kelompok 1', desc: 'Engine Mechanical & EFI', color: 'bg-blue-500', icon: 'settings' },
            { id: 'g2', name: 'Kelompok 2', desc: 'Chassis & Suspension', color: 'bg-indigo-500', icon: 'truck' },
            { id: 'g3', name: 'Kelompok 3', desc: 'Electrical & AC', color: 'bg-cyan-500', icon: 'zap' }
        ];

        function initListeners() {
            onSnapshot(query(collection(db, "observasi"), orderBy("timestamp", "desc")), (snap) => {
                observations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            });
            onSnapshot(query(collection(db, "materi"), orderBy("timestamp", "desc")), (snap) => {
                materials = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            });
        }

        window.navigate = (view, gid = null, oid = null) => {
            state = { ...state, view, groupId: gid, obsId: oid, searchQuery: '' };
            render();
        };

        window.handleSearch = (e) => {
            state.searchQuery = e.target.value.toLowerCase();
            renderMaterialsOnly();
        };

        window.hapusData = async (type, id) => {
            if(confirm("Apakah Anda yakin ingin menghapus data ini secara permanen?")) {
                try {
                    await deleteDoc(doc(db, type, id));
                    if(type === 'observasi') {
                        materials.filter(m => m.obsId === id).forEach(async m => {
                            await deleteDoc(doc(db, "materi", m.id));
                        });
                        navigate('group', state.groupId);
                    }
                } catch (e) { alert("Gagal menghapus!"); }
            }
        };

        function render() {
            const container = document.getElementById('view-container');
            const breadcrumb = document.getElementById('breadcrumb');

            let bc = `<button onclick="navigate('dashboard')" class="hover:text-blue-600 flex items-center gap-1"><i data-lucide="home" class="w-4 h-4"></i> Dashboard</button>`;
            if (state.groupId) {
                const g = GROUPS.find(x => x.id === state.groupId);
                bc += ` <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i> <button onclick="navigate('group', '${g.id}')" class="font-medium text-slate-600">${g.name}</button>`;
            }
            if (state.obsId) {
                const o = observations.find(x => x.id === state.obsId);
                bc += ` <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i> <span class="font-bold text-blue-600">${o?.title || '...'}</span>`;
            }
            breadcrumb.innerHTML = bc;

            if (state.view === 'dashboard') renderDashboard(container);
            else if (state.view === 'group') renderGroup(container);
            else if (state.view === 'observation') renderObservation(container);

            lucide.createIcons();
        }

        function renderDashboard(container) {
            container.innerHTML = `
                <div class="mb-10 text-center md:text-left">
                    <h1 class="text-3xl font-black text-slate-900 tracking-tight italic uppercase">Automobile Tech Hub</h1>
                    <p class="text-slate-500 mt-2">Pusat kolaborasi otomotif Cloud.</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    ${GROUPS.map(g => `
                        <div onclick="navigate('group', '${g.id}')" class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm hover:shadow-xl hover:-translate-y-2 transition-all cursor-pointer group">
                            <div class="w-16 h-16 ${g.color} text-white rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-blue-200"><i data-lucide="${g.icon}" class="w-8 h-8"></i></div>
                            <h3 class="text-xl font-bold text-slate-800">${g.name}</h3>
                            <p class="text-slate-500 text-sm mt-2 mb-6">${g.desc}</p>
                            <div class="flex items-center text-blue-600 font-bold text-sm">Buka Panel <i data-lucide="arrow-right" class="ml-2 w-4 h-4"></i></div>
                        </div>
                    `).join('')}
                </div>`;
        }

        function renderGroup(container) {
            const g = GROUPS.find(x => x.id === state.groupId);
            const list = observations.filter(o => o.groupId === state.groupId);
            container.innerHTML = `
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-black text-slate-800 flex items-center gap-3"><span class="w-2 h-8 ${g.color} rounded-full"></span> ${g.name}</h2>
                    <button id="btn-add-obs" class="bg-blue-600 text-white px-5 py-3 rounded-2xl flex items-center gap-2 font-bold shadow-lg hover:bg-blue-700 transition"><i data-lucide="plus" class="w-5 h-5"></i> Tambah</button>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${list.map(o => `
                        <div class="bg-white p-6 rounded-2xl border border-slate-200 hover:border-blue-400 hover:shadow-lg transition cursor-pointer flex flex-col relative group">
                            <div onclick="navigate('observation', '${g.id}', '${o.id}')" class="flex-grow">
                                <i data-lucide="file-text" class="text-blue-500 mb-4 w-6 h-6"></i>
                                <h3 class="font-bold text-lg text-slate-800 mb-2">${o.title}</h3>
                            </div>
                            <button onclick="hapusData('observasi', '${o.id}')" class="absolute top-4 right-4 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition p-2">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    `).join('')}
                </div>`;
            
            document.getElementById('btn-add-obs').onclick = () => openModal("Tambah Observasi", `
                <input type="text" id="inp-title" placeholder="Nama Observasi (Contoh: Pemeriksaan EFI)..." class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-blue-500 mb-4">
                <button id="save-obs" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg">SIMPAN</button>
            `, async () => {
                const title = document.getElementById('inp-title').value;
                if(!title) return;
                await addDoc(collection(db, "observasi"), { title, groupId: state.groupId, timestamp: Date.now() });
                closeModal();
            });
        }

        function renderObservation(container) {
            const o = observations.find(x => x.id === state.obsId);
            container.innerHTML = `
                <div class="bg-white p-6 md:p-8 rounded-3xl border border-slate-200 shadow-sm mb-8">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                        <div>
                            <h2 class="text-2xl font-black text-slate-800 tracking-tight">${o?.title || '...'}</h2>
                            <p class="text-sm text-slate-400 mt-1">Gunakan kata kunci untuk mencari materi spesifik.</p>
                        </div>
                        <button id="btn-add-mat" class="bg-blue-600 text-white px-8 py-4 rounded-2xl flex items-center gap-2 font-black shadow-lg hover:bg-blue-700 transition w-full md:w-auto justify-center">
                            <i data-lucide="plus" class="w-5 h-5"></i> Tambah Materi
                        </button>
                    </div>
                    
                    <!-- FITUR SEARCH -->
                    <div class="mt-8 relative search-focus border-2 border-slate-100 bg-slate-50 rounded-2xl transition-all">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="search" class="w-5 h-5 text-slate-400"></i>
                        </div>
                        <input type="text" id="search-input" oninput="handleSearch(event)" placeholder="Cari judul materi atau isi catatan..." 
                            class="block w-full pl-12 pr-4 py-4 bg-transparent outline-none text-slate-700 font-medium">
                    </div>
                </div>

                <div id="materials-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <!-- Materi akan muncul di sini -->
                </div>`;

            renderMaterialsOnly();

            document.getElementById('btn-add-mat').onclick = () => openModal("Bagikan Materi Baru", `
                <input type="text" id="mat-title" placeholder="Judul Materi..." class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-blue-500 mb-4 text-sm font-semibold">
                <input type="url" id="mat-url" placeholder="Link Video YouTube..." class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-blue-500 mb-4 text-sm">
                <textarea id="mat-notes" placeholder="Catatan penting atau kata kunci..." rows="3" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-blue-500 mb-4 text-sm"></textarea>
                <button id="save-mat" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg uppercase tracking-wider">Posting Materi</button>
            `, async () => {
                const title = document.getElementById('mat-title').value;
                const url = document.getElementById('mat-url').value;
                const notes = document.getElementById('mat-notes').value;
                if(!title || !url) return alert("Harap isi judul dan link video!");
                await addDoc(collection(db, "materi"), { title, url, notes, obsId: state.obsId, groupId: state.groupId, timestamp: Date.now() });
                closeModal();
            });
        }

        function renderMaterialsOnly() {
            const grid = document.getElementById('materials-grid');
            if(!grid) return;

            const filtered = materials.filter(m => {
                if (m.obsId !== state.obsId) return false;
                if (!state.searchQuery) return true;
                return m.title.toLowerCase().includes(state.searchQuery) || 
                       m.notes.toLowerCase().includes(state.searchQuery);
            });

            if(filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-16 text-center text-slate-400">
                        <i data-lucide="search-x" class="w-12 h-12 mx-auto mb-4 opacity-20"></i>
                        <p class="font-medium italic">Materi tidak ditemukan dengan kata kunci "${state.searchQuery}"</p>
                    </div>`;
            } else {
                grid.innerHTML = filtered.map(m => `
                    <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm hover:shadow-md transition relative group">
                        <button onclick="hapusData('materi', '${m.id}')" class="absolute top-4 right-4 bg-white/90 text-red-500 p-2 rounded-xl opacity-0 group-hover:opacity-100 transition shadow-lg z-10 border border-red-100 hover:bg-red-50 hover:text-red-600">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                        <div class="video-container m-3 mb-0 bg-slate-100">
                            <iframe src="https://www.youtube.com/embed/${getYouTubeId(m.url)}" frameborder="0" allowfullscreen></iframe>
                        </div>
                        <div class="p-6">
                            <h3 class="font-bold text-xl mb-3 text-slate-800 leading-tight">${m.title}</h3>
                            <div class="bg-slate-50 p-4 rounded-2xl text-slate-600 text-sm border border-slate-100 whitespace-pre-wrap leading-relaxed italic">
                                "${m.notes || 'Tidak ada catatan.'}"
                            </div>
                        </div>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        window.openModal = (title, content, onSave) => {
            const overlay = document.getElementById('modal-overlay');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-content').innerHTML = content;
            overlay.classList.remove('hidden');
            const saveBtn = overlay.querySelector('button[id^="save-"]');
            if(saveBtn) saveBtn.onclick = onSave;
            lucide.createIcons();
        };

        window.closeModal = () => document.getElementById('modal-overlay').classList.add('hidden');
        function getYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        render();
    </script>
</body>
</html>
