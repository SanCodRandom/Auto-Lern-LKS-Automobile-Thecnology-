<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AutoLearn Hub - Klasik Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 20px; background: #000; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .card-shadow { box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1); }
        .img-display { width: 100%; border-radius: 20px; object-fit: cover; max-height: 450px; display: block; }
        /* FITUR BARU: Menjaga format Enter/Daftar ke bawah sesuai ketikan */
        .preserve-format { white-space: pre-wrap; word-wrap: break-word; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-800 pb-10">

    <div id="app">
        <!-- HEADER KLASIK -->
        <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
            <div class="max-w-6xl mx-auto px-5 h-20 flex items-center justify-between">
                <div onclick="navigate('dashboard')" class="flex items-center gap-3 cursor-pointer">
                    <div class="bg-blue-600 p-2.5 rounded-2xl shadow-lg shadow-blue-200 text-white">
                        <i data-lucide="layout-grid" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h1 class="font-black text-xl tracking-tight leading-none text-slate-900 uppercase">AutoLearn</h1>
                        <p class="text-[10px] font-bold text-blue-600 tracking-[0.2em] uppercase">Multimedia Hub</p>
                    </div>
                </div>
                <div id="status-cloud" class="flex items-center gap-2 bg-slate-50 border border-slate-100 px-4 py-2 rounded-2xl text-[10px] font-bold text-slate-400">
                    <div class="w-2 h-2 bg-yellow-400 rounded-full animate-pulse"></div> MENGHUBUNGKAN...
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-5 mt-6">
            <nav id="breadcrumb" class="flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-6 overflow-x-auto no-scrollbar pb-2"></nav>
            <div id="view-container"></div>
        </main>

        <!-- MODAL -->
        <div id="modal-overlay" class="fixed inset-0 bg-slate-900/60 hidden z-[100] flex items-end md:items-center justify-center p-0 md:p-4 backdrop-blur-sm">
            <div class="bg-white rounded-t-[2.5rem] md:rounded-[2.5rem] w-full max-w-lg shadow-2xl overflow-hidden translate-y-full transition-transform duration-300" id="modal-box">
                <div class="flex justify-between items-center p-8 border-b border-slate-50">
                    <h3 id="modal-title" class="font-extrabold text-2xl text-slate-900">Judul</h3>
                    <button onclick="closeModal()" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-slate-50 text-slate-400"><i data-lucide="x"></i></button>
                </div>
                <div id="modal-content" class="p-8 max-h-[80vh] overflow-y-auto no-scrollbar pb-12"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDrMIXYG_T3TCsVqLzOizGiZH8NLA8d-jA",
            authDomain: "autolern.firebaseapp.com",
            projectId: "autolern",
            storageBucket: "autolern.firebasestorage.app",
            messagingSenderId: "428353288899",
            appId: "1:428353288899:web:59a2a4e60c3e9e14218076"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let observations = [], materials = [];
        let state = { view: 'dashboard', groupId: null, obsId: null };

        const GROUPS = [
            { id: 'g1', name: 'Kelompok 1', desc: 'Sistem Mesin & Kontrol', color: 'from-blue-600 to-blue-400', icon: 'settings' },
            { id: 'g2', name: 'Kelompok 2', desc: 'Sasis & Pemindah Daya', color: 'from-indigo-600 to-indigo-400', icon: 'truck' },
            { id: 'g3', name: 'Kelompok 3', desc: 'Kelistrikan & AC Mobil', color: 'from-cyan-600 to-cyan-400', icon: 'zap' }
        ];

        signInAnonymously(auth).then(() => {
            document.getElementById('status-cloud').innerHTML = '<div class="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_10px_rgba(34,197,94,0.6)]"></div> CLOUD AKTIF';
            onSnapshot(query(collection(db, "observasi"), orderBy("timestamp", "desc")), (s) => { observations = s.docs.map(d=>({id:d.id,...d.data()})); render(); });
            onSnapshot(query(collection(db, "materi"), orderBy("timestamp", "desc")), (s) => { materials = s.docs.map(d=>({id:d.id,...d.data()})); render(); });
        });

        window.navigate = (v, g=null, o=null) => { state = { ...state, view: v, groupId: g, obsId: o }; render(); window.scrollTo(0,0); };

        window.hapusData = async (type, id) => { if(confirm("Hapus item ini?")) await deleteDoc(doc(db, type, id)); };

        function render() {
            const container = document.getElementById('view-container');
            const breadcrumb = document.getElementById('breadcrumb');
            let bc = `<button onclick="navigate('dashboard')" class="hover:text-blue-600">DASHBOARD</button>`;
            if (state.groupId) bc += ` <i data-lucide="chevron-right" class="w-3 h-3 mx-1"></i> <button onclick="navigate('group', '${state.groupId}')">${GROUPS.find(g=>g.id===state.groupId).name}</button>`;
            if (state.obsId) bc += ` <i data-lucide="chevron-right" class="w-3 h-3 mx-1 text-blue-300"></i> <span class="text-blue-600">${observations.find(o=>o.id===state.obsId)?.title || ''}</span>`;
            breadcrumb.innerHTML = bc;

            if (state.view === 'dashboard') renderDashboard(container);
            else if (state.view === 'group') renderGroup(container);
            else renderObservation(container);
            lucide.createIcons();
        }

        function renderDashboard(container) {
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-4">
                    ${GROUPS.map(g => `
                        <div onclick="navigate('group', '${g.id}')" class="bg-white p-8 rounded-[2.5rem] card-shadow cursor-pointer hover:-translate-y-2 transition-all relative overflow-hidden group">
                            <div class="bg-gradient-to-br ${g.color} w-16 h-16 rounded-2xl flex items-center justify-center text-white mb-6 shadow-xl shadow-blue-100"><i data-lucide="${g.icon}"></i></div>
                            <h3 class="text-xl font-extrabold text-slate-900">${g.name}</h3>
                            <p class="text-slate-400 text-xs mt-2 font-bold uppercase tracking-wider">${g.desc}</p>
                            <i data-lucide="arrow-right" class="absolute right-8 bottom-8 text-slate-100 w-12 h-12 group-hover:text-blue-500 transition-colors"></i>
                        </div>
                    `).join('')}
                </div>`;
        }

        function renderGroup(container) {
            const list = observations.filter(o => o.groupId === state.groupId);
            container.innerHTML = `
                <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                    <h2 class="text-xl font-black text-slate-900 px-2 italic uppercase">Pilih Materi</h2>
                    <button id="btn-add-obs" class="bg-blue-600 text-white p-4 rounded-2xl shadow-lg active:scale-90 transition"><i data-lucide="plus" class="w-6 h-6"></i></button>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
                    ${list.map(o => `
                        <div class="bg-white p-6 rounded-[2rem] border border-slate-50 card-shadow flex flex-col justify-between min-h-[140px] relative overflow-hidden">
                            <div onclick="navigate('observation', '${state.groupId}', '${o.id}')" class="cursor-pointer z-10">
                                <h3 class="font-extrabold text-slate-800 text-lg leading-snug">${o.title}</h3>
                            </div>
                            <div class="flex justify-between items-center mt-6 z-10">
                                <span class="text-[9px] font-black text-slate-300 tracking-[0.2em] uppercase">${new Date(o.timestamp).toLocaleDateString()}</span>
                                <button onclick="hapusData('observasi', '${o.id}')" class="text-slate-200 hover:text-red-500 transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            document.getElementById('btn-add-obs').onclick = () => openModal("Tambah Topik", `
                <input type="text" id="inp-title" placeholder="Nama materi observasi..." class="w-full bg-slate-50 border-2 p-5 rounded-2xl mb-4 font-bold outline-none focus:border-blue-500">
                <button id="save-obs" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl">Simpan Materi</button>
            `, async () => {
                const t = document.getElementById('inp-title').value;
                if(t) await addDoc(collection(db, "observasi"), { title: t, groupId: state.groupId, timestamp: Date.now() });
                closeModal();
            });
        }

        function renderObservation(container) {
            container.innerHTML = `
                <div class="bg-white p-8 rounded-[2.5rem] border border-slate-50 card-shadow mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
                    <h2 class="text-2xl font-black text-slate-900 italic uppercase">${observations.find(o=>o.id===state.obsId)?.title || ''}</h2>
                    <button id="btn-add-mat" class="bg-blue-600 text-white px-8 py-4 rounded-2xl text-xs font-black shadow-lg uppercase tracking-widest">+ Item Baru</button>
                </div>
                <div id="materials-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-8 pb-32"></div>`;
            renderMaterialsOnly();

            document.getElementById('btn-add-mat').onclick = () => openModal("Unggah Materi", `
                <input type="text" id="mat-title" placeholder="Judul materi..." class="w-full bg-slate-50 border-2 p-5 rounded-2xl mb-4 font-bold outline-none focus:border-blue-500">
                <div class="flex gap-3 mb-6">
                    <button onclick="switchTab('yt')" id="tab-yt" class="flex-1 py-3 rounded-xl bg-blue-600 text-white text-[10px] font-black uppercase">LINK YOUTUBE</button>
                    <button onclick="switchTab('img')" id="tab-img" class="flex-1 py-3 rounded-xl bg-slate-100 text-slate-400 text-[10px] font-black uppercase">UNGGAH FOTO</button>
                </div>
                <div id="area-yt" class="mb-4"><input type="url" id="mat-url" placeholder="Masukkan Link Video..." class="w-full border-2 p-5 rounded-2xl text-xs outline-none focus:border-blue-500"></div>
                <div id="area-img" class="hidden mb-4"><input type="file" id="mat-file" accept="image/*" class="w-full text-xs font-bold border-2 border-dashed p-6 rounded-2xl bg-slate-50"></div>
                <textarea id="mat-notes" placeholder="Tulis catatan (Enter untuk baris baru)..." rows="6" class="w-full bg-slate-50 border-2 p-5 rounded-2xl mb-6 text-sm font-semibold outline-none focus:border-blue-500"></textarea>
                <button id="save-mat" class="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black uppercase tracking-widest text-sm shadow-2xl">Simpan Sekarang</button>
            `, async () => {
                const t = document.getElementById('mat-title').value, n = document.getElementById('mat-notes').value, y = document.getElementById('mat-url').value, f = document.getElementById('mat-file');
                if(!t) return;
                let d = { title:t, notes:n, obsId:state.obsId, timestamp:Date.now(), type:'youtube', url:y };
                if(!document.getElementById('area-img').classList.contains('hidden') && f.files[0]) {
                    const r = new FileReader();
                    r.onload = async (e) => { d.type = 'image'; d.url = e.target.result; await addDoc(collection(db, "materi"), d); closeModal(); };
                    r.readAsDataURL(f.files[0]); return;
                }
                await addDoc(collection(db, "materi"), d); closeModal();
            });
        }

        window.switchTab = (tab) => {
            const isYt = tab === 'yt';
            document.getElementById('area-yt').classList.toggle('hidden', !isYt);
            document.getElementById('area-img').classList.toggle('hidden', isYt);
            document.getElementById('tab-yt').className = isYt ? "flex-1 py-3 rounded-xl bg-blue-600 text-white text-[10px] font-black uppercase" : "flex-1 py-3 rounded-xl bg-slate-100 text-slate-400 text-[10px] font-black uppercase";
            document.getElementById('tab-img').className = !isYt ? "flex-1 py-3 rounded-xl bg-blue-600 text-white text-[10px] font-black uppercase" : "flex-1 py-3 rounded-xl bg-slate-100 text-slate-400 text-[10px] font-black uppercase";
        };

        function renderMaterialsOnly() {
            const grid = document.getElementById('materials-grid');
            if(!grid) return;
            const filtered = materials.filter(m => m.obsId === state.obsId);
            grid.innerHTML = filtered.map(m => `
                <div class="bg-white rounded-[2.5rem] border border-slate-50 overflow-hidden shadow-2xl relative group transition-all hover:shadow-blue-200/50">
                    <button onclick="hapusData('materi', '${m.id}')" class="absolute top-6 right-6 bg-white/80 p-3 rounded-2xl text-red-500 z-20 shadow-lg border border-white hover:bg-red-50 transition active:scale-90"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                    <div class="p-4">
                        ${m.type === 'image' ? `<img src="${m.url}" class="img-display" onclick="window.open('${m.url}', '_blank')">` : `<div class="video-container"><iframe src="https://www.youtube.com/embed/${getYouTubeId(m.url)}"></iframe></div>`}
                    </div>
                    <div class="p-8">
                        <h3 class="font-black text-xl mb-4 text-slate-900 leading-tight uppercase italic">${m.title}</h3>
                        <div class="bg-slate-50 p-6 rounded-3xl text-slate-600 text-[12px] font-semibold leading-relaxed border border-slate-100 preserve-format">
                            ${m.notes || 'No extra notes provided.'}
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        window.openModal = (title, content, onSave) => {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-content').innerHTML = content;
            document.getElementById('modal-overlay').classList.remove('hidden');
            setTimeout(() => document.getElementById('modal-box').classList.remove('translate-y-full'), 10);
            document.getElementById('save-mat')?.addEventListener('click', onSave);
            document.getElementById('save-obs')?.addEventListener('click', onSave);
            lucide.createIcons();
        };

        window.closeModal = () => {
            document.getElementById('modal-box').classList.add('translate-y-full');
            setTimeout(() => document.getElementById('modal-overlay').classList.add('hidden'), 300);
        };

        function getYouTubeId(url) {
            const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]*).*/;
            const match = url.match(reg);
            return (match && match[2].length === 11) ? match[2] : 'dQw4w9WgXcQ';
        }

        render();
    </script>
</body>
</html>
